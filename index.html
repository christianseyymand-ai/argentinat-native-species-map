<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Native Plants Argentina Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIINfQuxp3DVCUUt5Kq1POnM4B0M2DJC0="
    crossorigin=""
  />

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #eef2f3;
      overflow: hidden;
    }

    #map {
      width: 100vw;
      height: 100vh;
      background: #eef2f3;
    }

    .panel {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 1000;
      width: 340px;
      max-width: calc(100vw - 32px);
      background: rgba(255, 255, 255, 0.96);
      border-radius: 14px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.18);
      padding: 14px;
      backdrop-filter: blur(6px);
    }

    .panel h1 {
      margin: 0 0 8px;
      font-size: 20px;
      line-height: 1.2;
      color: #111827;
    }

    .panel p {
      margin: 6px 0;
      font-size: 13px;
      color: #4b5563;
      line-height: 1.4;
    }

    .stats {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #e5e7eb;
      font-size: 13px;
      color: #111827;
      line-height: 1.35;
    }

    .status {
      margin-top: 8px;
      font-size: 12px;
      color: #374151;
      line-height: 1.4;
    }

    .progress-wrap {
      margin-top: 10px;
      height: 8px;
      width: 100%;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #16a34a;
      transition: width 0.25s ease;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.35;
    }

    .error {
      color: #b91c1c;
      font-weight: bold;
    }

    .popup-title {
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .popup-common {
      font-size: 13px;
      color: #4b5563;
      margin-bottom: 6px;
    }

    .popup-meta {
      font-size: 12px;
      color: #374151;
      margin: 2px 0;
    }

    .popup-photo {
      width: 180px;
      max-width: 100%;
      margin-top: 8px;
      border-radius: 8px;
      display: block;
    }

    .popup-link {
      display: inline-block;
      margin-top: 8px;
      font-size: 12px;
      color: #2563eb;
      text-decoration: none;
    }

    .popup-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 700px) {
      .panel {
        top: 10px;
        left: 10px;
        right: 10px;
        width: auto;
        padding: 12px;
      }

      .panel h1 {
        font-size: 17px;
      }

      .panel p,
      .stats,
      .status,
      .hint {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div class="panel">
    <h1>Native Plants Argentina</h1>
    <p>Observaciones georreferenciadas de plantas nativas/endémicas en Argentina.</p>

    <div class="stats">
      <div><strong>Estado:</strong> <span id="statusText">Cargando vista rápida...</span></div>
      <div><strong>Vista rápida:</strong> <span id="overviewCount">0</span></div>
      <div><strong>Zona cargada:</strong> <span id="tileObservationCount">0</span></div>
      <div><strong>Tiles cargados:</strong> <span id="tilesCount">0</span></div>
    </div>

    <div class="progress-wrap">
      <div id="progressBar" class="progress-bar"></div>
    </div>

    <div id="detailStatus" class="status">
      Leyendo datos...
    </div>

    <div class="hint">
      Tip: acercá el zoom para cargar todas las observaciones de la zona visible.
    </div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    const ARGENTINA_CENTER = [-38.4161, -63.6167];

    const ARGENTINA_BOUNDS = L.latLngBounds(
      [-56.0, -74.0],
      [-21.0, -53.0]
    );

    const map = L.map("map", {
      preferCanvas: true,
      minZoom: 4,
      maxZoom: 18,
      maxBounds: ARGENTINA_BOUNDS.pad(0.25),
      maxBoundsViscosity: 0.8,
      worldCopyJump: false
    }).setView(ARGENTINA_CENTER, 4);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      minZoom: 4,
      maxZoom: 18,
      noWrap: true,
      bounds: ARGENTINA_BOUNDS.pad(0.5),
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    const statusText = document.getElementById("statusText");
    const overviewCount = document.getElementById("overviewCount");
    const tileObservationCount = document.getElementById("tileObservationCount");
    const tilesCount = document.getElementById("tilesCount");
    const detailStatus = document.getElementById("detailStatus");
    const progressBar = document.getElementById("progressBar");

    const overviewLayerGroup = L.layerGroup().addTo(map);
    const tileLayerGroup = L.layerGroup().addTo(map);

    let tileManifest = null;
    let loadedTileKeys = new Set();
    let loadingTileKeys = new Set();
    let totalLoadedTileObservations = 0;

    const MIN_ZOOM_FOR_FULL_TILES = 7;

    function formatNumber(value) {
      return new Intl.NumberFormat("es-AR").format(value || 0);
    }

    function escapeHtml(value) {
      if (value === null || value === undefined) return "";

      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function popupContent(feature) {
      const p = feature.properties || {};

      const scientificName = escapeHtml(p.scientific_name || "Sin nombre científico");
      const commonName = escapeHtml(p.common_name || "");
      const observedOn = escapeHtml(p.observed_on || "Sin fecha");
      const placeGuess = escapeHtml(p.place_guess || "");
      const userLogin = escapeHtml(p.user_login || "");
      const uri = p.uri || "";
      const photoUrl = p.photo_url || "";

      let html = `
        <div class="popup-title"><em>${scientificName}</em></div>
      `;

      if (commonName) {
        html += `<div class="popup-common">${commonName}</div>`;
      }

      html += `<div class="popup-meta"><strong>Fecha:</strong> ${observedOn}</div>`;

      if (placeGuess) {
        html += `<div class="popup-meta"><strong>Lugar:</strong> ${placeGuess}</div>`;
      }

      if (userLogin) {
        html += `<div class="popup-meta"><strong>Usuario:</strong> ${userLogin}</div>`;
      }

      if (photoUrl) {
        html += `<img class="popup-photo" src="${escapeHtml(photoUrl)}" alt="${scientificName}" loading="lazy" />`;
      }

      if (uri) {
        html += `<a class="popup-link" href="${escapeHtml(uri)}" target="_blank" rel="noopener noreferrer">Ver observación</a>`;
      }

      return html;
    }

    function overviewPointToLayer(feature, latlng) {
      return L.circleMarker(latlng, {
        radius: 3,
        weight: 0,
        color: "#15803d",
        fillColor: "#16a34a",
        opacity: 0.45,
        fillOpacity: 0.35
      });
    }

    function detailedPointToLayer(feature, latlng) {
      return L.circleMarker(latlng, {
        radius: 4,
        weight: 1,
        color: "#14532d",
        fillColor: "#22c55e",
        opacity: 0.75,
        fillOpacity: 0.55
      });
    }

    async function fetchJson(path) {
      const response = await fetch(path, {
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error(`No se pudo cargar ${path}`);
      }

      return response.json();
    }

    async function loadOverview() {
      statusText.textContent = "Cargando vista rápida...";
      detailStatus.textContent = "Leyendo data/geojson_overview.geojson";

      const overviewGeojson = await fetchJson("./data/geojson_overview.geojson");
      const features = Array.isArray(overviewGeojson.features) ? overviewGeojson.features : [];

      const layer = L.geoJSON(overviewGeojson, {
        pointToLayer: overviewPointToLayer
      });

      overviewLayerGroup.clearLayers();
      overviewLayerGroup.addLayer(layer);

      overviewCount.textContent = formatNumber(features.length);

      map.setView(ARGENTINA_CENTER, 4);

      statusText.textContent = "Vista rápida lista";
      detailStatus.textContent = "Acercá el zoom para cargar todos los puntos de la zona.";
    }

    async function loadTileManifest() {
      tileManifest = await fetchJson("./data/geojson_tile_manifest.json");

      if (!tileManifest.tiles) {
        throw new Error("El manifest no tiene tiles válidos.");
      }
    }

    function tileKeysForCurrentBounds() {
      if (!tileManifest) return [];

      const bounds = map.getBounds();

      const south = Math.floor(bounds.getSouth());
      const north = Math.floor(bounds.getNorth());
      const west = Math.floor(bounds.getWest());
      const east = Math.floor(bounds.getEast());

      const keys = [];

      for (let lat = south; lat <= north; lat += 1) {
        for (let lon = west; lon <= east; lon += 1) {
          const key = `${lat},${lon}`;

          if (tileManifest.tiles[key]) {
            keys.push(key);
          }
        }
      }

      return keys;
    }

    async function loadTile(key) {
      if (!tileManifest || !tileManifest.tiles[key]) return;
      if (loadedTileKeys.has(key) || loadingTileKeys.has(key)) return;

      loadingTileKeys.add(key);

      const tileInfo = tileManifest.tiles[key];
      const path = `./data/${tileInfo.path}`;

      try {
        detailStatus.textContent = `Cargando tile ${key}...`;

        const tileGeojson = await fetchJson(path);
        const features = Array.isArray(tileGeojson.features) ? tileGeojson.features : [];

        const layer = L.geoJSON(tileGeojson, {
          pointToLayer: detailedPointToLayer,
          onEachFeature: function (feature, layer) {
            layer.bindPopup(popupContent(feature));
          }
        });

        tileLayerGroup.addLayer(layer);

        loadedTileKeys.add(key);
        totalLoadedTileObservations += features.length;

        tilesCount.textContent = formatNumber(loadedTileKeys.size);
        tileObservationCount.textContent = formatNumber(totalLoadedTileObservations);

        console.log(`Loaded tile ${key}: ${features.length} features`);
      } catch (error) {
        console.error(error);
      } finally {
        loadingTileKeys.delete(key);
      }
    }

    async function updateVisibleTiles() {
      if (!tileManifest) return;

      const zoom = map.getZoom();

      if (zoom < MIN_ZOOM_FOR_FULL_TILES) {
        statusText.textContent = "Vista rápida";
        detailStatus.textContent = `Zoom ${zoom}. Acercá hasta zoom ${MIN_ZOOM_FOR_FULL_TILES} para cargar observaciones completas por zona.`;
        progressBar.style.width = "0%";
        return;
      }

      const keys = tileKeysForCurrentBounds();
      const keysToLoad = keys.filter(
        key => !loadedTileKeys.has(key) && !loadingTileKeys.has(key)
      );

      if (keysToLoad.length === 0) {
        statusText.textContent = "Zona cargada";
        detailStatus.textContent = `Tiles visibles ya cargados. Observaciones cargadas: ${formatNumber(totalLoadedTileObservations)}.`;
        progressBar.style.width = "100%";
        return;
      }

      statusText.textContent = "Cargando zona...";
      detailStatus.textContent = `Cargando ${keysToLoad.length} tiles visibles...`;

      let completed = 0;

      for (const key of keysToLoad) {
        await loadTile(key);
        completed += 1;

        const percent = Math.round((completed / keysToLoad.length) * 100);
        progressBar.style.width = `${percent}%`;
      }

      statusText.textContent = "Zona cargada";
      detailStatus.textContent = `Listo. Tiles cargados: ${formatNumber(loadedTileKeys.size)}.`;
    }

    function debounce(fn, delay) {
      let timeout = null;

      return function () {
        clearTimeout(timeout);
        timeout = setTimeout(fn, delay);
      };
    }

    async function init() {
      try {
        map.setView(ARGENTINA_CENTER, 4);

        await loadOverview();

        statusText.textContent = "Cargando manifest...";
        detailStatus.textContent = "Leyendo data/geojson_tile_manifest.json";

        await loadTileManifest();

        statusText.textContent = "Listo";
        detailStatus.textContent = `Dataset completo disponible por tiles. Total estimado: ${formatNumber(tileManifest.total_observations || 0)} observaciones.`;

        const debouncedUpdate = debounce(updateVisibleTiles, 350);

        map.on("moveend", debouncedUpdate);
        map.on("zoomend", debouncedUpdate);

        await updateVisibleTiles();
      } catch (error) {
        console.error(error);

        statusText.innerHTML = '<span class="error">Error</span>';
        detailStatus.innerHTML = `
          <span class="error">
            ${escapeHtml(error.message)}
          </span>
        `;
      }
    }

    init();
  </script>
</body>
</html>
