name: Update All Native Plants Argentina

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Update all native plant observations
        run: |
          python scripts/update_all_native_plants_argentina.py

      - name: Commit updated biodiversity data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/

          git status

          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "Update native plant observation data"
            git push
          fi
