name: Update All Native Plants Argentina

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-native-plants
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Update all native plant observations
        run: |
          python scripts/update_all_native_plants_argentina.py

      - name: Commit updated biodiversity data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/
          git add -A data/geojson_chunks/

          git status

          if git diff --cached --quiet; then
            echo "No data changes to commit"
            exit 0
          fi

          git commit -m "Update native plant observation data"

          git pull --rebase origin main
          git push origin main
